<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador Centros Digitales R3</title>
  <style>
    :root { 
      --bg: #05080a; 
      --header-bg: #d32f2f;
      --card: #0d1117; 
      --ink: #ffffff; 
      --muted: #cbd5e1; 
      --accent: #ff0000;
      --accent-glow: rgba(211, 47, 47, 0.4);
      --border: #30363d;
      --white: #ffffff;
    }

    html, body { 
      background: var(--bg); 
      color: var(--ink); 
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
      margin: 0; 
      overflow-x: hidden;
    }

    header { 
      padding: 25px 40px; 
      background: var(--header-bg); 
      color: white;
      border-bottom: 2px solid var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
      display: flex;
      align-items: center;
      justify-content: center; /* CENTRADO DE CONTENIDO */
      gap: 30px;
      position: relative;
    }

    .header-logo-left {
      width: 150px; 
      height: auto;
      border-radius: 8px;
      position: absolute; /* Para no empujar el título del centro */
      left: 40px;
    }

    /* IMAGEN OTO MÁS GRANDE */
    .oto-logo {
      width: 100px; 
      height: auto;
      border-radius: 12px;
      border: 2px solid white;
      box-shadow: 0 0 15px white;
    }

    /* TÍTULO CENTRADO Y EN NEGRITA */
    h1 { 
      margin: 0; 
      font-size: 30px; 
      text-transform: uppercase; 
      letter-spacing: 1.5px;
      font-weight: 900; 
      text-align: center;
    }

    .container { padding: 30px; }

    .search-section { 
      background: var(--card); 
      padding: 20px; 
      border-radius: 15px; 
      border: 1px solid var(--accent);
      margin-bottom: 25px;
      display: flex;
      gap: 15px;
      box-shadow: 0 0 15px rgba(255, 0, 0, 0.1);
    }

    input#q { 
      flex-grow: 1; 
      background: #000; 
      border: 1px solid var(--border); 
      padding: 15px; 
      border-radius: 8px; 
      color: #00ff00; 
      font-family: monospace;
      font-size: 16px;
      outline: none;
    }

    input#q:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--accent-glow); }

    .btn { 
      padding: 15px 30px; 
      border-radius: 8px; 
      border: 1px solid var(--accent);
      cursor: pointer; 
      font-weight: bold; 
      text-transform: uppercase;
      transition: 0.3s;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #ff4d4d; box-shadow: 0 0 20px var(--accent); }

    .btn-secondary { background: transparent; color: white; border-color: #fff; }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); }

    .table-wrapper { 
      overflow-x: auto; 
      border-radius: 12px; 
      border: 1px solid var(--border); 
      background: var(--card);
      max-height: 70vh;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th { 
      background: #161b22; 
      padding: 18px; 
      text-align: left; 
      color: var(--accent); 
      border-bottom: 2px solid var(--accent);
      position: sticky; top: 0; z-index: 10;
      font-weight: bold;
    }

    /* ESTILO DE DATOS SIN NEGRITA */
    tbody td { 
      padding: 12px 18px; 
      border-bottom: 1px solid var(--border); 
      color: var(--white);
      font-weight: 400; /* Estilo normal */
      outline: none;
    }

    tbody tr:hover { background: rgba(255, 255, 255, 0.03); }

    .counter { 
      display: inline-block; 
      padding: 10px 20px; 
      background: rgba(211, 47, 47, 0.1);
      border-left: 4px solid var(--accent);
      font-size: 14px; 
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <img src="Imagen Buscador.jpg" alt="Logo" class="header-logo-left">
    
    <h1>Buscador Centros Digitales R3</h1>
    
    <img src="Oto.jpg" alt="Oto" class="oto-logo">
  </header>

  <div class="container">
    <div class="search-section">
      <input id="q" type="text" placeholder="TERMINAL DE BÚSQUEDA_ > Escriba aquí..." />
      <button class="btn btn-primary" onclick="ejecutarBusqueda()">BUSCAR</button>
      <button class="btn btn-secondary" onclick="limpiar()">BORRAR</button>
    </div>

    <div id="meta" class="counter">SISTEMA EN LÍNEA // ESPERANDO COMANDO</div>

    <div class="table-wrapper">
      <table id="mainTable">
        <thead id="theader"></thead>
        <tbody id="tfooter"></tbody>
      </table>
    </div>
  </div>

  <script>
    let rawData = [];
    let headers = [];

    async function cargarBD() {
      try {
        const respuesta = await fetch('data_ben.json');
        rawData = await respuesta.json();
        if (rawData.length > 0) {
          headers = Object.keys(rawData[0]);
          construirCabecera();
          mostrarResultados(rawData);
          document.getElementById('meta').textContent = `ESTADO: OK // ${rawData.length} REGISTROS CARGADOS`;
        }
      } catch (error) {
        document.getElementById('meta').textContent = "ERROR EN BASE DE DATOS";
      }
    }

    function construirCabecera() {
      const headerRow = headers.map(h => `<th>${h.replace(/_/g, ' ')}</th>`).join('');
      document.getElementById('theader').innerHTML = `<tr>${headerRow}</tr>`;
    }

    function mostrarResultados(lista) {
      const cuerpo = document.getElementById('tfooter');
      if (lista.length === 0) {
        cuerpo.innerHTML = `<tr><td colspan="${headers.length}" style="text-align:center; padding:30px; color:var(--accent);">SIN COINCIDENCIAS</td></tr>`;
        return;
      }

      const filasHtml = lista.map(item => {
        const celdas = headers.map(col => {
          let valor = item[col] || "-";
          return `<td contenteditable="true" onblur="guardarCambio(${item.ID}, '${col}', this.innerText)">${valor}</td>`;
        }).join('');
        return `<tr>${celdas}</tr>`;
      }).join('');

      cuerpo.innerHTML = filasHtml;
    }

    function ejecutarBusqueda() {
      const termino = document.getElementById('q').value.toLowerCase().trim();
      const filtrados = rawData.filter(fila => 
        Object.values(fila).some(valor => String(valor).toLowerCase().includes(termino))
      );
      mostrarResultados(filtrados);
      document.getElementById('meta').textContent = `BÚSQUEDA: ${filtrados.length} REGISTROS`;
    }

    function limpiar() {
      document.getElementById('q').value = "";
      mostrarResultados(rawData);
      document.getElementById('meta').textContent = `ESTADO: OK // ${rawData.length} REGISTROS CARGADOS`;
      document.getElementById('q').focus();
    }

    async function guardarCambio(id, columna, nuevoValor) {
      const registro = rawData.find(item => item.ID == id);
      if (registro) {
        registro[columna] = nuevoValor;
      }
      try {
        await fetch('http://localhost:5000/guardar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(rawData)
        });
      } catch (error) {
        console.error("Error al sincronizar.");
      }
    }

    document.getElementById('q').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') ejecutarBusqueda();
    });

    window.onload = cargarBD;
  </script>
</body>
</html>
