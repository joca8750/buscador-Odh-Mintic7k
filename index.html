<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buscador Centros Digitales R3</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=League+Gothic&display=swap');

    :root { 
      --bg: #ffffff; 
      --header-bg: #d32f2f;
      --ink: #000000; 
      --accent: #d32f2f;
      --border: #d1d5db;
      --seg-total: #1e40af; 
      --seg-dept: #b91c1c;  
      --seg-proj: #374151;  
    }

    html, body { 
      background: var(--bg); 
      color: var(--ink); 
      font-family: 'Luxia', 'Segoe UI', Roboto, sans-serif; 
      margin: 0; 
      overflow-x: hidden;
    }

    /* HEADER RESPONSIVO */
    header { 
      padding: 20px; 
      background: var(--header-bg); 
      color: white;
      border-bottom: 4px solid #b71c1c;
      display: flex;
      flex-direction: column; /* Apila logo y título en móviles */
      align-items: center;
      gap: 15px;
      text-align: center;
    }

    .header-logo-left {
      width: 130px; 
      height: auto;
      border-radius: 8px;
    }

    h1 { 
      margin: 0; 
      font-size: 32px; 
      text-transform: uppercase; 
      letter-spacing: 1px;
      font-family: 'League Gothic', sans-serif;
      font-weight: 400;
    }

    .container { padding: 15px; }

    /* SECCIÓN DE BÚSQUEDA ADAPTABLE */
    .search-section { 
      background: #f8f9fa; 
      padding: 15px; 
      border-radius: 15px; 
      border: 1px solid var(--border);
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap; /* Permite que los botones bajen si no caben */
      gap: 10px;
    }

    input#q { 
      flex: 1 1 100%; /* El buscador ocupa todo el ancho en móvil */
      background: #ffffff; 
      border: 2px solid var(--border); 
      padding: 12px; 
      border-radius: 8px; 
      font-size: 16px;
      outline: none;
    }

    .btn { 
      flex: 1; /* Los botones crecen para ocupar el espacio equitativamente */
      padding: 12px; 
      border-radius: 8px; 
      border: none; 
      cursor: pointer; 
      font-weight: bold; 
      text-transform: uppercase; 
      transition: 0.3s;
      font-size: 14px;
    }
    
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: #6b7280; color: white; }

    /* SEGMENTOS DE ESTADÍSTICAS EN FILA O COLUMNA */
    .stats-row { 
      display: flex; 
      flex-direction: column; /* En móvil se apilan para leerse mejor */
      margin-bottom: 20px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .stat-segment {
      padding: 10px 15px;
      font-size: 12px;
      color: white;
      font-weight: 400;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    .seg-total { background: var(--seg-total); }
    .seg-dept { background: var(--seg-dept); overflow-x: auto; white-space: nowrap; }
    .seg-proj { background: var(--seg-proj); border-bottom: none; }

    /* TABLA CON SCROLL MEJORADO */
    .table-wrapper { 
      overflow-x: auto; 
      border-radius: 12px; 
      border: 1px solid var(--border); 
      background: #ffffff;
      max-height: 50vh;
      -webkit-overflow-scrolling: touch; /* Scroll suave en iOS */
    }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #f3f4f6; padding: 12px; text-align: left; color: var(--accent); position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--accent); }
    tbody td { padding: 10px; border-bottom: 1px solid #eeeeee; color: #000000; }

    /* AJUSTES PARA PANTALLAS GRANDES (PC) */
    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: center; }
      .header-logo-left { position: absolute; left: 40px; }
      h1 { font-size: 42px; }
      .search-section { flex-wrap: nowrap; }
      input#q { flex: 1 1 auto; }
      .btn { flex: 0 0 auto; padding: 15px 30px; }
      .stats-row { flex-direction: row; }
      .stat-segment { border-bottom: none; border-right: 2px solid white; }
    }
  </style>
</head>
<body>

  <header>
    <img src="Imagen Buscador.jpg" alt="Logo" class="header-logo-left">
    <h1>Buscador Centros Digitales R3</h1>
  </header>

  <div class="container">
    <div class="search-section">
      <input id="q" type="text" placeholder="Buscar sitio..." />
      <button class="btn btn-primary" onclick="ejecutarBusqueda()">BUSCAR</button>
      <button class="btn btn-secondary" onclick="limpiar()">BORRAR</button>
    </div>

    <div class="stats-row">
      <div id="meta" class="stat-segment seg-total">CARGANDO...</div>
      <div id="dept-stats" class="stat-segment seg-dept">...</div>
      <div id="proj-stats" class="stat-segment seg-proj">...</div>
    </div>

    <div class="table-wrapper">
      <table id="mainTable">
        <thead id="theader"></thead>
        <tbody id="tfooter"></tbody>
      </table>
    </div>
  </div>

  <script>
    let rawData = [];
    let headers = [];

    async function cargarBD() {
      try {
        const respuesta = await fetch('data_ben.json');
        rawData = await respuesta.json();
        if (rawData.length > 0) {
          headers = Object.keys(rawData[0]);
          construirCabecera();
          actualizarInterfaz(rawData);
        }
      } catch (error) { document.getElementById('meta').textContent = "ERROR CONEXIÓN"; }
    }

    function construirCabecera() {
      const headerRow = headers.map(h => `<th>${h.replace(/_/g, ' ')}</th>`).join('');
      document.getElementById('theader').innerHTML = `<tr>${headerRow}</tr>`;
    }

    function calcularResumen(data, columna) {
      const conteo = {};
      data.forEach(item => {
        const valor = (item[columna] || "N/A").toString().toUpperCase();
        conteo[valor] = (conteo[valor] || 0) + 1;
      });
      return Object.entries(conteo).map(([key, val]) => `${val} ${key}`).join(' | ');
    }

    function actualizarInterfaz(data) {
      mostrarResultados(data);
      document.getElementById('meta').textContent = `${data.length} REGISTROS`;
      document.getElementById('dept-stats').textContent = calcularResumen(data, 'DEPARTAMENTO');
      document.getElementById('proj-stats').textContent = calcularResumen(data, 'PROYECTO');
    }

    function mostrarResultados(lista) {
      const cuerpo = document.getElementById('tfooter');
      if (lista.length === 0) {
        cuerpo.innerHTML = `<tr><td colspan="${headers.length}" style="text-align:center; padding:30px; color:var(--accent);">SIN RESULTADOS</td></tr>`;
        return;
      }
      const filasHtml = lista.map(item => {
        const celdas = headers.map(col => `<td>${item[col] || "-"}</td>`).join('');
        return `<tr>${celdas}</tr>`;
      }).join('');
      cuerpo.innerHTML = filasHtml;
    }

    function ejecutarBusqueda() {
      const termino = document.getElementById('q').value.toLowerCase().trim();
      const filtrados = rawData.filter(fila => Object.values(fila).some(v => String(v).toLowerCase().includes(termino)));
      actualizarInterfaz(filtrados);
    }

    function limpiar() {
      document.getElementById('q').value = "";
      actualizarInterfaz(rawData);
    }

    window.onload = cargarBD;
  </script>
</body>
</html>
