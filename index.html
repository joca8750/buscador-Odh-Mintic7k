<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buscador Maestro - ODH</title>
  <style>
    :root { --bg: #0b1220; --card: #111a2b; --ink: #e6eefc; --muted: #9db0d1; --accent: #3b82f6; --border: #1e2a44; }
    html, body { background: var(--bg); color: var(--ink); font-family: 'Segoe UI', sans-serif; margin: 0; }
    
    header { 
      padding: 30px; 
      background: linear-gradient(135deg, #1f2a44 0%, #13233a 100%); 
      border-bottom: 1px solid var(--border); 
      display: flex; align-items: center; gap: 30px; 
    }

    .header-logo { 
      width: 220px; /* IMAGEN EN TAMAÑO GRANDE */
      height: auto; border-radius: 12px; 
      box-shadow: 0 6px 15px rgba(0,0,0,0.4); 
    }

    h1 { margin: 0; font-size: 32px; font-weight: 700; }

    .container { padding: 20px; }
    
    .search-section { 
      background: var(--card); padding: 20px; border-radius: 12px; 
      border: 1px solid var(--border); margin-bottom: 20px; 
      display: flex; gap: 15px; align-items: center; 
    }

    input#q { 
      flex-grow: 1; background: #0b1527; border: 1px solid #2b3b5c; 
      padding: 14px; border-radius: 8px; color: white; font-size: 16px; 
    }

    .btn { 
      padding: 14px 28px; border-radius: 8px; border: none; 
      cursor: pointer; font-weight: 600; background: var(--accent); color: white; 
    }

    .table-wrapper { overflow-x: auto; border-radius: 10px; border: 1px solid var(--border); background: var(--card); }
    
    table { width: 100%; border-collapse: collapse; font-size: 13px; white-space: nowrap; }
    
    thead th { 
      background: #1e293b; padding: 15px; text-align: left; 
      text-transform: uppercase; font-size: 11px; position: sticky; top: 0; 
    }

    tbody td { padding: 12px 15px; border-bottom: 1px solid #17243f; color: var(--muted); outline: none; }
    tbody td[contenteditable="true"]:focus { background: #1e2a44; color: white; border: 1px solid var(--accent); }

    .counter { display: inline-block; padding: 8px 18px; background: #1e2a44; border-radius: 25px; font-size: 13px; color: var(--accent); margin-bottom: 15px; font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <img src="Imagen Buscador.jpg" alt="Buscador" class="header-logo">
    <h1>Buscador Maestro de Beneficiarios</h1>
  </header>

  <div class="container">
    <div class="search-section">
      <input id="q" type="text" placeholder="Busca por ID, DANE, Municipio o cualquier dato..." />
      <button class="btn" onclick="ejecutarBusqueda()">BUSCAR</button>
    </div>

    <div id="meta" class="counter">Cargando base de datos...</div>

    <div class="table-wrapper">
      <table>
        <thead id="theader"></thead>
        <tbody id="tfooter"></tbody>
      </table>
    </div>
  </div>

  <script>
    let rawData = [], headers = [];

    async function cargarBD() {
      try {
        const res = await fetch('data_ben.json');
        rawData = await res.json();
        if (rawData.length > 0) {
          headers = Object.keys(rawData[0]); // Detecta todas las columnas automáticamente
          render(rawData);
        }
      } catch (e) { document.getElementById('meta').textContent = "Error al cargar datos."; }
    }

    function render(data) {
      document.getElementById('theader').innerHTML = `<tr>${headers.map(h => `<th>${h}</th>`).join('')}</tr>`;
      document.getElementById('tfooter').innerHTML = data.map(item => `
        <tr>${headers.map(col => `
          <td contenteditable="true" onblur="guardarCambio(${item.ID}, '${col}', this.innerText)">
            ${item[col] || '-'}
          </td>`).join('')}</tr>
      `).join('');
      document.getElementById('meta').textContent = `${data.length} registros cargados`;
    }

    function ejecutarBusqueda() {
      const q = document.getElementById('q').value.toLowerCase();
      const filtrados = rawData.filter(f => Object.values(f).some(v => String(v).toLowerCase().includes(q)));
      render(filtrados);
    }

    async function guardarCambio(id, col, val) {
      const item = rawData.find(i => i.ID == id);
      if (item) {
        item[col] = val;
        try {
          // Cambia 'localhost' por tu IP Pública si vas a editar desde fuera de tu red
          await fetch('http://localhost:5000/guardar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(rawData)
          });
          console.log("Sincronizado.");
        } catch (e) { console.error("Error al guardar en servidor remoto."); }
      }
    }

    document.getElementById('q').addEventListener('keypress', (e) => { if (e.key === 'Enter') ejecutarBusqueda(); });
    window.onload = cargarBD;
  </script>
</body>
</html>
